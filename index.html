<!DOCTYPE html>
<html>
<head>
  <title>Unnamed Level List</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .level {
      border: 1px solid #444;
      margin: 10px auto;
      padding: 10px;
      width: 600px;

      display: flex;
      align-items: center;
      text-align: left;

      background: #1a1a1a;
      border-radius: 15px;

      transition: all 0.3s ease;
    }

    .level img {
      width: 200px;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      margin-right: 15px;

      transition: transform 0.3s ease;
    }

    /* 🔥 HOVER ANIMACE */
    .level:hover {
      transform: scale(1.05);
      background: #222;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .level:hover img {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<h1>Unnamed Level List</h1>

<div id="list"></div>

<script src="script.js"></script>

</body>
</html>
